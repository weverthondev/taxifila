<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiFila — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border-radius: 20px;
            border: none;
        }
        .btn-taxi {
            background-color: #f4c430;
            color: #1a1a2e;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-size: 1.1rem;
        }
        .btn-taxi:hover {
            background-color: #e6b800;
            color: #1a1a2e;
        }
        .logo {
            font-size: 3rem;
        }
        input {
            font-size: 1.3rem !important;
            text-align: center;
            border-radius: 10px !important;
            padding: 12px !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 col-sm-8 col-10">
                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <div class="logo">🚕</div>
                        <h2 class="fw-bold">TaxiFila</h2>
                        <p class="text-muted">Entre com o número do seu carro</p>
                    </div>
                    {% if erro %}
                    <div class="alert alert-danger text-center">{{ erro }}</div>
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="Nº do carro (ex: 07)" required autofocus>
                        </div>
                        <div class="mb-4">
                            <input type="password" name="password" class="form-control" placeholder="Senha" required>
                        </div>
                        <button type="submit" class="btn btn-taxi w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
